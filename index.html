<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control Escolar · Acceso</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0c0f14;--surface:#13181f;--surface2:#1a2030;
  --border:#2a3444;--border2:#364050;
  --accent:#00d4a8;--accent-dim:rgba(0,212,168,.12);
  --accent2:#4d9fff;
  --text:#dce8f5;--text2:#7a90a8;--text3:#3e5060;
  --danger:#ff5f7e;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sora',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}

/* FONDO ANIMADO */
.bg-grid{position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:48px 48px;opacity:.3;pointer-events:none}
.bg-glow{position:fixed;top:-200px;left:50%;transform:translateX(-50%);width:700px;height:500px;background:radial-gradient(ellipse,rgba(0,212,168,.12) 0%,transparent 70%);pointer-events:none}

.card{
  position:relative;z-index:1;
  background:var(--surface);border:1px solid var(--border2);
  border-radius:20px;padding:44px 48px;width:420px;max-width:95vw;
  box-shadow:0 24px 64px rgba(0,0,0,.6);
  animation:slideUp .5s ease both;
}
@keyframes slideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}

.logo-wrap{display:flex;align-items:center;gap:14px;margin-bottom:36px}
.logo-icon{
  width:48px;height:48px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  border-radius:14px;display:flex;align-items:center;justify-content:center;
  font-size:22px;box-shadow:0 0 28px rgba(0,212,168,.35);flex-shrink:0;
}
.logo-text{font-size:20px;font-weight:800;line-height:1.3}
.logo-text small{display:block;font-size:12px;font-weight:400;color:var(--text2)}

.field{display:flex;flex-direction:column;gap:8px;margin-bottom:18px}
.field label{font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.1em}
.inp-wrap{position:relative}
.inp-wrap .ico{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:16px;pointer-events:none}
.field input{
  width:100%;background:var(--surface2);border:1px solid var(--border);
  color:var(--text);padding:13px 14px 13px 44px;border-radius:10px;
  font-size:14px;font-family:'Sora';transition:all .2s;
}
.field input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,212,168,.12)}
.field input::placeholder{color:var(--text3)}

.err-msg{
  font-size:12px;color:var(--danger);
  background:rgba(255,95,126,.08);border:1px solid rgba(255,95,126,.2);
  border-radius:8px;padding:10px 14px;margin-bottom:16px;display:none;
}
.err-msg.show{display:block;animation:shake .3s ease}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}

.btn-login{
  width:100%;padding:14px;border-radius:10px;
  background:var(--accent);color:#000;font-size:14px;font-weight:700;
  border:none;cursor:pointer;font-family:'Sora';
  transition:all .2s;margin-top:4px;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.btn-login:hover{background:#00f0c0;box-shadow:0 0 28px rgba(0,212,168,.45);transform:translateY(-1px)}
.btn-login:active{transform:translateY(0)}

.footer{margin-top:28px;text-align:center;font-size:11px;color:var(--text3)}
.footer span{color:var(--accent);font-family:'JetBrains Mono';font-weight:700}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-glow"></div>

<div class="card">
  <div class="logo-wrap">
    <div class="logo-icon">📚</div>
    <div class="logo-text">
      Control Escolar
      <small>Bachillerato · Iniciar sesión</small>
    </div>
  </div>

  <div class="field">
    <label>Usuario</label>
    <div class="inp-wrap">
      <span class="ico">👤</span>
      <input type="text" id="inp-user" placeholder="Tu usuario" autocomplete="username" onkeydown="if(event.key==='Enter')login()"/>
    </div>
  </div>

  <div class="field">
    <label>Contraseña</label>
    <div class="inp-wrap">
      <span class="ico">🔒</span>
      <input type="password" id="inp-pass" placeholder="Tu contraseña" autocomplete="current-password" onkeydown="if(event.key==='Enter')login()"/>
    </div>
  </div>

  <div class="err-msg" id="err-msg">⚠️ Usuario o contraseña incorrectos.</div>

  <button class="btn-login" onclick="login()">
    Entrar al sistema →
  </button>

  <div class="footer">Sistema de Control Escolar &nbsp;·&nbsp; Ciclo <span>2024–2025</span></div>
</div>

<script>
const USERS = {
  JAN: { pass: '1995', home: 'InicioENE.HTML' }
};

function login() {
  const user = document.getElementById('inp-user').value.trim();
  const pass = document.getElementById('inp-pass').value;
  const err  = document.getElementById('err-msg');

  if (USERS[user] && USERS[user].pass === pass) {
    err.classList.remove('show');
    sessionStorage.setItem('ce_user', user);
    window.location.href = USERS[user].home;
  } else {
    err.classList.add('show');
    document.getElementById('inp-pass').value = '';
    document.getElementById('inp-pass').focus();
  }
}
</script>
</body>
</html>
