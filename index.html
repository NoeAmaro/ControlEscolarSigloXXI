<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Control Escolar</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0c0f14;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box{
  background:#13181f;
  padding:30px;
  border-radius:10px;
  width:300px;
  box-shadow:0 0 20px rgba(0,0,0,0.5);
}

h2{
  text-align:center;
  margin-bottom:20px;
}

input{
  width:100%;
  padding:10px;
  margin-bottom:10px;
  border:none;
  border-radius:5px;
}

button{
  width:100%;
  padding:10px;
  border:none;
  border-radius:5px;
  background:#00d4a8;
  color:black;
  font-weight:bold;
  cursor:pointer;
}

button:hover{
  background:#00f0c0;
}

.error{
  color:red;
  text-align:center;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="box">
  <h2>🔐 Iniciar Sesión</h2>

  <input type="text" id="user" placeholder="Usuario">
  <input type="password" id="pass" placeholder="Contraseña">

  <button onclick="login()">Entrar</button>

  <div class="error" id="error"></div>
</div>

<script>
function login(){
  const user = document.getElementById('user').value;
  const pass = document.getElementById('pass').value;

  if(user === "JAN" && pass === "1995"){
    window.location.href = "dashboard.html";
  } else {
    document.getElementById('error').textContent = "Usuario o contraseña incorrectos";
  }
}
</script>

</body>
</html>
